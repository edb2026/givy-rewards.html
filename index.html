Вот полный код веб-приложения Givy Rewards Marketplace — доска объявлений с регистрацией, товарами, админ-панелью, рейтингом продавцов и интеграцией мессенджеров.

```html
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Givy Rewards Marketplace | Товары и обмен</title>
    <style>

        /* админ таблица */

</head>
<body>
<div id="app"></div>

<script>
    // ------------------- STORAGE KEYS --------------------
    const STORAGE = {
        users: 'givy_users',
        products: 'givy_products',
        ratings: 'givy_ratings',      // seller ratings
        messages: 'givy_messages',
        nextIds: 'givy_next_ids'
    };

    // helpers
    function getStorage(key, defaultValue = []) {
        const data = localStorage.getItem(key);
        return data ? JSON.parse(data) : defaultValue;
    }
    function setStorage(key, data) {
        localStorage.setItem(key, JSON.stringify(data));
    }

    // ---- init default admin & demo data ----
    function initData() {
        let users = getStorage(STORAGE.users, []);
        if (users.length === 0) {
            users = [
                { id: 'u1', email: 'admin@givy.com', username: 'AdminGivy', password: 'admin123', role: 'admin', contactMethods: [] },
                { id: 'u2', email: 'alice@example.com', username: 'AliceWonder', password: '123456', role: 'user', contactMethods: [{ type: 'whatsapp', value: '+79991234567' }, { type: 'telegram', value: '@alice_tg' }] },
                { id: 'u3', email: 'bob@example.com', username: 'BobBuilder', password: '123456', role: 'user', contactMethods: [{ type: 'email', value: 'bob@example.com' }] }
            ];
            setStorage(STORAGE.users, users);
        }

        let products = getStorage(STORAGE.products, []);
        if (products.length === 0) {
            products = [
                { id: 'p1', sellerId: 'u2', title: 'Стул офисный', description: 'Удобный стул, почти новый', price: 2500, priceType: 'paid', category: 'Мебель', locationZip: '101000', images: [], status: 'active', createdAt: Date.now() },
                { id: 'p2', sellerId: 'u3', title: 'Книги по программированию', description: '3 книги JS, Python', price: 'free', priceType: 'free', category: 'Книги', locationZip: '105120', images: [], status: 'active', createdAt: Date.now() },
                { id: 'p3', sellerId: 'u2', title: 'Наушники Sony', description: 'Отличное состояние', price: 3200, priceType: 'paid', category: 'Электроника', locationZip: '101000', images: [], status: 'active', createdAt: Date.now() }
            ];
            setStorage(STORAGE.products, products);
        }

        let ratings = getStorage(STORAGE.ratings, []);
        if (ratings.length === 0) {
            ratings = [
                { id: 'r1', sellerId: 'u2', userId: 'u3', rating: 9, comment: 'Отличный продавец, быстро отвечает', createdAt: Date.now() },
                { id: 'r2', sellerId: 'u3', userId: 'u2', rating: 10, comment: 'Все честно, рекомендую', createdAt: Date.now() }
            ];
            setStorage(STORAGE.ratings, ratings);
        }

        let messages = getStorage(STORAGE.messages, []);
        setStorage(STORAGE.messages, messages);
    }
    initData();

    // current session
    let currentUser = null;

    // helper: найти пользователя
    function getUserById(uid) {
        const users = getStorage(STORAGE.users);
        return users.find(u => u.id === uid);
    }

    // получить средний рейтинг продавца
    function getSellerAverageRating(sellerId) {
        const ratings = getStorage(STORAGE.ratings).filter(r => r.sellerId === sellerId);
        if (!ratings.length) return null;
        const avg = ratings.reduce((sum, r) => sum + r.rating, 0) / ratings.length;
        return avg.toFixed(1);
    }

    // получить комментарии о продавце
    function getSellerComments(sellerId) {
        return getStorage(STORAGE.ratings).filter(r => r.sellerId === sellerId).sort((a,b)=>b.createdAt - a.createdAt);
    }

    // добавить рейтинг продавцу
    function addRating(sellerId, userId, rating, comment) {
        const ratings = getStorage(STORAGE.ratings);
        const newRating = { id: Date.now() + '' + Math.random(), sellerId, userId, rating: Number(rating), comment, createdAt: Date.now() };
        ratings.push(newRating);
        setStorage(STORAGE.ratings, ratings);
    }

    // добавить товар
    function addProduct(product) {
        const products = getStorage(STORAGE.products);
        products.push(product);
        setStorage(STORAGE.products, products);
    }

    // обновить статус видимости
    function updateProductVisibility(productId, hidden) {
        let products = getStorage(STORAGE.products);
        const index = products.findIndex(p => p.id === productId);
        if (index !== -1) {
            products[index].status = hidden ? 'hidden' : 'active';
            setStorage(STORAGE.products, products);
        }
    }

    // отправить сообщение от админа продавцу
    function sendMessage(fromId, toId, text) {
        const messages = getStorage(STORAGE.messages);
        messages.push({ id: Date.now() + '_msg', fromId, toId, text, timestamp: Date.now(), read: false });
        setStorage(STORAGE.messages, messages);
    }

    function getUserMessages(userId) {
        return getStorage(STORAGE.messages).filter(m => m.toId === userId);
    }

    // --- рендер приложения (SPA) ---
    let currentView = 'marketplace';

    function render() {
        if (!currentUser) {
            renderAuthScreen();
            return;
        }
        const container = document.getElementById('app');
        let viewHtml = '';
        // хедер
        viewHtml = `
            <div class="app-header">
                <div class="header-top">
                    <div class="logo"><h1>🎁 Givy Rewards Marketplace</h1><span>обменивайся с выгодой</span></div>
                    <div class="user-greeting">👋 ${currentUser.username} (${currentUser.role === 'admin' ? 'Админ' : 'Покупатель/Продавец'})</div>
                    <div class="nav-links">
                        <button data-nav="marketplace">🏠 Товары</button>
                        <button data-nav="addProduct">➕ Выставить товар</button>
                        <button data-nav="profile">👤 Профиль</button>
                        ${currentUser.role === 'admin' ? '<button data-nav="admin">🛡️ Админ-панель</button>' : ''}
                        <button data-nav="logout">🚪 Выйти</button>
                    </div>
                </div>
            </div>
            <div class="container" id="viewContainer"></div>
            <footer>
                <button class="btn-footer" id="gotoRewards">🌟 Перейти на Givy Rewards</button>
                <button class="btn-footer" id="gotoShop">🛍️ Перейти на GivyRewardsShop</button>
            </footer>
        `;
        container.innerHTML = viewHtml;
        attachNavEvents();
        document.getElementById('gotoRewards')?.addEventListener('click', () => alert('Переход на Givy Rewards (демо)'));
        document.getElementById('gotoShop')?.addEventListener('click', () => alert('Переход на GivyRewardsShop (демо)'));

        loadView(currentView);
    }

    function attachNavEvents() {
        document.querySelectorAll('[data-nav]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const nav = btn.getAttribute('data-nav');
                if (nav === 'logout') { logout(); return; }
                currentView = nav;
                loadView(currentView);
            });
        });
    }

    function loadView(view) {
        const container = document.getElementById('viewContainer');
        if (view === 'marketplace') renderMarketplace(container);
        else if (view === 'addProduct') renderAddProduct(container);
        else if (view === 'profile') renderProfile(container);
        else if (view === 'admin' && currentUser?.role === 'admin') renderAdminPanel(container);
        else renderMarketplace(container);
    }

    // marketplace: все активные товары
    function renderMarketplace(container) {
        let products = getStorage(STORAGE.products).filter(p => p.status === 'active');
        const sellersMap = new Map();
        products.forEach(p => {
            if (!sellersMap.has(p.sellerId)) sellersMap.set(p.sellerId, getUserById(p.sellerId));
        });
        let html = `<h2>📢 Все товары на маркетплейсе</h2><div class="products-grid">`;
        if (products.length === 0) html += `<p>Пока товаров нет, станьте первым продавцом!</p>`;
        products.forEach(product => {
            const seller = getUserById(product.sellerId);
            const avgRating = getSellerAverageRating(product.sellerId);
            const priceDisplay = product.priceType === 'free' ? 'БЕСПЛАТНО' : `${product.price} ₽`;
            const freeClass = product.priceType === 'free' ? 'free-tag' : '';
            html += `
                <div class="product-card" data-product-id="${product.id}">
                    <div class="product-img">${product.images && product.images[0] ? `<img src="${product.images[0]}" alt="фото">` : '<span>📷 нет фото</span>'}</div>
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(product.title)}</div>
                        <div class="price-badge ${freeClass}">${priceDisplay}</div>
                        <div class="seller-rating">⭐ Рейтинг продавца: ${avgRating ? avgRating + '/10' : 'нет оценок'}</div>
                        <div class="location">📍 ${product.locationZip || 'не указан'}</div>
                        <div class="contact-icons">
                            ${renderContactMethods(seller?.contactMethods || [])}
                        </div>
                        <button class="detail-btn" data-id="${product.id}">Подробнее & отзывы</button>
                        <button class="share-fb" data-title="${product.title}">🔗 Поделиться FB</button>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;

        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const pid = btn.getAttribute('data-id');
                showProductDetail(pid);
            });
        });
        document.querySelectorAll('.share-fb').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const title = btn.getAttribute('data-title');
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}&quote=${title}`, '_blank');
            });
        });
    }

    function renderContactMethods(methods) {
        if (!methods.length) return '<span class="contact-badge">📞 Связь: не указана</span>';
        return methods.map(m => `<span class="contact-badge">${m.type.toUpperCase()}: ${m.value}</span>`).join('');
    }

    function showProductDetail(productId) {
        const products = getStorage(STORAGE.products);
        const product = products.find(p => p.id === productId);
        if (!product) return;
        const seller = getUserById(product.sellerId);
        const sellerRatings = getSellerComments(seller.id);
        const avgRating = getSellerAverageRating(seller.id);
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3>${escapeHtml(product.title)}</h3>
                <p><strong>Описание:</strong> ${escapeHtml(product.description)}</p>
                <p><strong>Цена:</strong> ${product.priceType === 'free' ? 'Бесплатно' : product.price + ' ₽'}</p>
                <p><strong>Категория:</strong> ${product.category}</p>
                <p><strong>Локация ZIP:</strong> ${product.locationZip}</p>
                <hr>
                <h4>👤 Продавец: ${seller.username}</h4>
                <div><strong>Средний рейтинг:</strong> ${avgRating ? avgRating + '/10' : 'нет оценок'}</div>
                <div><strong>Контакты:</strong> ${renderContactMethods(seller.contactMethods)}</div>
                <h4>📝 Отзывы о продавце:</h4>
                <div id="commentsList">${sellerRatings.map(r => `<div>⭐ ${r.rating}/10 &nbsp; ${escapeHtml(r.comment)} <small>от ${getUserById(r.userId)?.username || 'пользователь'}</small></div>`).join('') || '<i>Нет комментариев</i>'}</div>
                <hr>
                ${currentUser && currentUser.id !== seller.id ? `
                <h4>Оценить продавца (1-10)</h4>
                <input type="number" id="ratingScore" min="1" max="10" step="1" placeholder="Оценка">
                <textarea id="ratingComment" placeholder="Ваш комментарий"></textarea>
                <button id="submitRatingBtn">Отправить оценку</button>
                ` : ''}
                <button id="closeModal">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('closeModal')?.addEventListener('click', () => modalDiv.remove());
        if (currentUser && currentUser.id !== seller.id) {
            document.getElementById('submitRatingBtn')?.addEventListener('click', () => {
                const score = document.getElementById('ratingScore').value;
                const comment = document.getElementById('ratingComment').value;
                if (score && score >=1 && score <=10) {
                    addRating(seller.id, currentUser.id, score, comment);
                    alert('Спасибо за оценку!');
                    modalDiv.remove();
                    showProductDetail(productId);
                } else alert('Введите число от 1 до 10');
            });
        }
    }

    function renderAddProduct(container) {
        let imageFiles = [];
        let imagePreviews = [];
        const html = `
            <div class="form-card">
                <h2>📦 Выставить товар</h2>
                <input type="text" id="prodTitle" placeholder="Название товара" required>
                <textarea id="prodDesc" rows="3" placeholder="Описание (средней длины)"></textarea>
                <select id="prodCategory"><option>Электроника</option><option>Одежда</option><option>Мебель</option><option>Книги</option><option>Другое</option></select>
                <div><label><input type="checkbox" id="isFree"> Бесплатно</label></div>
                <div id="priceDiv"><input type="number" id="prodPrice" placeholder="Цена в ₽"></div>
                <input type="text" id="zipCode" placeholder="Индекс (ZIP)">
                <button id="getLocationBtn">📍 Применить мою локацию</button>
                <div><label>Фото (до 10)</label><input type="file" id="prodImages" accept="image/*" multiple></div>
                <div id="imagePreviewContainer" class="image-preview"></div>
                <button id="submitProductBtn">Опубликовать товар</button>
            </div>
        `;
        container.innerHTML = html;
        const freeCheck = document.getElementById('isFree');
        const priceDiv = document.getElementById('priceDiv');
        freeCheck.addEventListener('change', () => { priceDiv.style.display = freeCheck.checked ? 'none' : 'block'; });
        document.getElementById('getLocationBtn').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    try {
                        const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=ru`);
                        const data = await res.json();
                        const zip = data.postcode || '101000';
                        document.getElementById('zipCode').value = zip;
                        alert(`Локация определена: почтовый индекс ${zip}`);
                    } catch(e) { document.getElementById('zipCode').value = '101000'; alert('Демо: ZIP установлен 101000'); }
                }, () => alert('Не удалось определить, укажите вручную'));
            } else alert('Геолокация не поддерживается');
        });

        const fileInput = document.getElementById('prodImages');
        fileInput.addEventListener('change', (e) => {
            imagePreviews = [];
            const files = Array.from(e.target.files).slice(0,10);
            const previewDiv = document.getElementById('imagePreviewContainer');
            previewDiv.innerHTML = '';
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.classList.add('preview-img');
                    previewDiv.appendChild(img);
                    imagePreviews.push(ev.target.result);
                };
                reader.readAsDataURL(file);
            });
            imageFiles = files;
        });

        document.getElementById('submitProductBtn').addEventListener('click', () => {
            const title = document.getElementById('prodTitle').value;
            const desc = document.getElementById('prodDesc').value;
            const category = document.getElementById('prodCategory').value;
            const isFree = document.getElementById('isFree').checked;
            const priceVal = isFree ? 'free' : parseFloat(document.getElementById('prodPrice').value);
            const zip = document.getElementById('zipCode').value;
            if (!title || !desc) { alert('Заполните название и описание'); return; }
            if (!isFree && (!priceVal || priceVal <= 0)) { alert('Укажите цену'); return; }
            const product = {
                id: 'prod_' + Date.now() + '_' + Math.random().toString(36),
                sellerId: currentUser.id,
                title, description: desc, price: isFree ? 'free' : priceVal, priceType: isFree ? 'free' : 'paid',
                category, locationZip: zip || 'Не указан',
                images: imagePreviews.slice(0,10),
                status: 'active', createdAt: Date.now()
            };
            addProduct(product);
            alert('Товар опубликован!');
            currentView = 'marketplace';
            render();
        });
    }

    function renderProfile(container) {
        const user = currentUser;
        let ownProducts = getStorage(STORAGE.products).filter(p => p.sellerId === user.id);
        const messages = getUserMessages(user.id);
        let contactHtml = '';

        };

        const prodContainer = document.getElementById('myProductsList');

            document.querySelectorAll('.deleteOwnProduct').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let prods = getStorage(STORAGE.products).filter(p => p.id !== btn.getAttribute('data-id'));
                    setStorage(STORAGE.products, prods);
                    renderProfile(container);
                });

        document.getElementById('addContactBtn')?.addEventListener('click', () => {

    // Админ панель: бесплатные товары, скрыть, написать продавцу
    function renderAdminPanel(container) {
        let allProducts = getStorage(STORAGE.products);
        let freeProducts = allProducts.filter(p => p.priceType === 'free');

                </tr>`;
            }).join('');
            document.querySelectorAll('.toggleHideBtn').forEach(btn => {
                btn.addEventListener('click', () => {

                    const isHidden = btn.getAttribute('data-hidden') === 'true';
                    updateProductVisibility(prodId, !isHidden);
                    renderFreeTable();
                });

            document.querySelectorAll('.msgSellerBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const sellerId = btn.getAttribute('data-id');

        });
        document.getElementById('regBtn')?.addEventListener('click', () => {

            if(users.find(u=>u.email===email)) return alert('Email занят');
            const newUser = { id: 'u'+Date.now(), email, username: name, password: pass, role: 'user', contactMethods: [] };
            users.push(newUser);
            setStorage(STORAGE.users, users);
            currentUser = newUser;
            render();
        });
    }

    function logout() { currentUser = null; render(); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    render();
